<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - Edit 图像编辑</title>
  <link rel="icon" href="/static/common/img/favicon/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/common/css/common.css?v=1.5.3" rel="stylesheet">
  <link href="/static/public/css/image-edit.css?v=1.5.3" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <main class="flex-1 container mx-auto max-w-5xl px-6 py-8 fade-in">
    <div class="space-y-6">
      <div class="edit-header-row">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight">Edit 图像编辑</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm">上传图片并通过提示词进行编辑，支持多图参考和并发任务。</p>
        </div>
        <div class="edit-actions">
          <button id="startBtn" class="geist-button gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            开始编辑
          </button>
          <button id="stopBtn" class="geist-button-outline gap-2 hidden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="5" width="14" height="14" />
            </svg>
            停止
          </button>
        </div>
      </div>

      <div class="h-px bg-[var(--border)]"></div>

      <div class="edit-top-grid">
        <div class="edit-card">
          <div class="card-title">编辑设置</div>
          <div class="edit-settings-grid">
            <div class="settings-block prompt-block">
              <label class="field-label" for="promptInput">提示词</label>
              <textarea id="promptInput" class="geist-input edit-textarea"
                placeholder="描述你想要的编辑效果，例如：将背景改为星空、把图片变成油画风格"></textarea>
            </div>
            <div class="settings-block size-block">
              <label class="field-label" for="sizeSelect">图片尺寸</label>
              <select id="sizeSelect" class="geist-input">
                <option value="1024x1024" selected>1024x1024 方形</option>
                <option value="1280x720">1280x720 横屏</option>
                <option value="720x1280">720x1280 竖屏</option>
                <option value="1792x1024">1792x1024 宽幅</option>
                <option value="1024x1792">1024x1792 竖幅</option>
              </select>
            </div>
            <div class="settings-block n-block">
              <label class="field-label" for="nSelect">生成数量</label>
              <select id="nSelect" class="geist-input">
                <option value="1" selected>1 张</option>
                <option value="2">2 张</option>
              </select>
            </div>
            <div class="settings-block upload-area-block">
              <label class="field-label">参考图片 <span class="text-[var(--accents-3)]">(最多 3 张)</span></label>
              <div id="uploadArea" class="upload-area">
                <div id="uploadPlaceholder" class="upload-placeholder">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                  </svg>
                  <span>点击或拖拽上传图片</span>
                  <span class="upload-hint">支持 PNG / JPG / WebP，每张最大 15MB</span>
                </div>
                <div id="thumbnailList" class="thumbnail-list"></div>
              </div>
              <input id="imageFileInput" type="file" accept="image/png,image/jpeg,image/webp" multiple class="hidden">
              <div class="upload-meta">
                <span id="imageCount">已选 0/3 张</span>
                <button id="clearImagesBtn" class="geist-button-outline text-xs px-3" type="button">清除全部</button>
              </div>
            </div>
          </div>
        </div>

        <div class="edit-card">
          <div class="status-header">
            <div class="card-title">运行状态</div>
            <span id="statusText" class="status-text">未连接</span>
          </div>
          <div class="progress-wrap">
            <div id="progressBar" class="progress-bar">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="progress-meta">
              <span id="progressText">0%</span>
              <span id="durationValue">耗时 -</span>
            </div>
          </div>
          <div class="meta-grid">
            <div class="meta-item">
              <div class="meta-label">尺寸</div>
              <div id="sizeValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">数量</div>
              <div id="nValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">参考图</div>
              <div id="refValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">任务数</div>
              <div id="taskCountValue" class="meta-value">0</div>
            </div>
          </div>
        </div>
      </div>

      <div class="edit-card edit-gallery-card">
        <div class="edit-gallery-header">
          <div class="card-title">编辑结果</div>
          <div class="gallery-actions">
            <button id="clearBtn" class="geist-button-outline text-xs px-3">清空</button>
          </div>
        </div>
        <div id="galleryEmpty" class="edit-empty">等待生成图片</div>
        <div id="galleryStage" class="gallery-stage hidden"></div>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>

  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.5.3"></script>
  <script src="/static/common/js/public-header.js?v=1.5.5"></script>
  <script src="/static/common/js/footer.js?v=1.5.3"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/public/js/image-edit.js?v=1.5.4"></script>
</body>

</html>
