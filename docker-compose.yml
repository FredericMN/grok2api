services:
  grok2api:
    container_name: grok2api
    image: ghcr.io/chenyme/grok2api:latest
    ports:
      - "0.0.0.0:8100:8000"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      SERVER_PORT: 8000
      SERVER_WORKERS: 1
      SERVER_STORAGE_TYPE: local
      # 启用 CF 自动刷新: 取消以下三行注释，并取消底部 flaresolverr 服务的注释
      # FLARESOLVERR_URL: http://flaresolverr:8191
      # CF_REFRESH_INTERVAL: "600"
      # CF_TIMEOUT: "60"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./app/static/public/js/video.js:/app/app/static/public/js/video.js:ro
      - ./app/static/public/css/video.css:/app/app/static/public/css/video.css:ro
      - ./app_services_grok_services_video.py:/app/app/services/grok/services/video.py:ro
      - ./app/api/v1/image.py:/app/app/api/v1/image.py:ro
    restart: unless-stopped

  # 如果出口 IP 不干净，可取消以下注释使用 Warp 作为落地代理
  # 启用后将 proxy.base_proxy_url 设为 socks5://warp:1080
  # warp:
  #   container_name: warp
  #   image: caomingjun/warp:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - WARP_SLEEP=2
  #   cap_add:
  #     - NET_ADMIN

  # 启用 CF 自动刷新时取消以下注释
  # flaresolverr:
  #   container_name: flaresolverr
  #   image: ghcr.io/flaresolverr/flaresolverr:latest
  #   ports:
  #     - "127.0.0.1:8191:8191"
  #   environment:
  #     TZ: Asia/Shanghai
  #     LOG_LEVEL: info
  #   restart: unless-stopped
